# ============================================================
# Megatron DP 分布式训练 — K8s 部署清单
# ============================================================
# 架构:
#   Headless Service → StatefulSet (4 pods)
#   Pod-0 = MASTER (rank 0)
#   Pod-1..3 = Workers (rank 1..3)
#   torchrun 在每个 Pod 中启动 1 个训练进程
# ============================================================

---
# Headless Service: 让 Pod 之间可以通过 DNS 互相发现
# megatron-worker-0.megatron-dp-svc → Pod-0 的 IP
apiVersion: v1
kind: Service
metadata:
  name: megatron-dp-svc
  labels:
    app: megatron-dp
spec:
  clusterIP: None          # Headless!
  selector:
    app: megatron-dp
  ports:
  - port: 29500            # torchrun rendezvous 端口
    name: torchrun

---
# StatefulSet: 4 个有序 Pod，hostname 稳定 (megatron-worker-0, 1, 2, 3)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: megatron-worker
  labels:
    app: megatron-dp
spec:
  serviceName: megatron-dp-svc
  replicas: 4
  podManagementPolicy: Parallel     # 所有 Pod 同时启动
  selector:
    matchLabels:
      app: megatron-dp
  template:
    metadata:
      labels:
        app: megatron-dp
    spec:
      containers:
      - name: trainer
        image: megatronacr0404.azurecr.io/megatron-hello-world:v2
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        ports:
        - containerPort: 29500
          name: torchrun
        env:
        # torchrun 需要的环境变量
        - name: MASTER_ADDR
          value: "megatron-worker-0.megatron-dp-svc"   # rank-0 Pod 的 DNS 名
        - name: MASTER_PORT
          value: "29500"
        - name: WORLD_SIZE
          value: "4"
        # RANK 从 Pod 的 hostname 中提取 (megatron-worker-{N} → N)
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command:
        - /bin/bash
        - -c
        - |
          # 从 hostname 提取 rank: megatron-worker-0 → 0
          export RANK=${POD_NAME##*-}
          export LOCAL_RANK=0
          echo "=== Pod ${POD_NAME}: RANK=${RANK}, MASTER=${MASTER_ADDR}:${MASTER_PORT} ==="

          # 等待 master Pod 的 DNS 可解析 (最多等 60 秒)
          for i in $(seq 1 60); do
            if getent hosts ${MASTER_ADDR} > /dev/null 2>&1; then
              echo "Master DNS resolved!"
              break
            fi
            echo "Waiting for master DNS... ($i/60)"
            sleep 1
          done

          # 启动分布式训练
          python dp_distributed_training.py
      restartPolicy: Always
